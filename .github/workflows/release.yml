name: Build and Release HISAT3N

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04  # 使用稍微旧一点的系统以获得更好的 GLIBC 兼容性
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make gcc g++ zlib1g-dev libbz2-dev liblzma-dev

      - name: Build HISAT2 components
        # 注入静态链接参数
        run: |
          make -j$(nproc) RELEASE_FLAGS="-O3 -m64 -mavx2 -flto -funroll-loops -static-libstdc++ -static-libgcc"

      - name: Build HISat3n Wrapper
        # 同样使用静态链接
        run: |
          g++ -O3 -flto -static-libstdc++ -static-libgcc -o hisat3n hisat2_wrapper.cpp

      - name: Package Binaries
        run: |
          mkdir -p hisat3n-bin
          cp hisat3n hisat2-align-s hisat2-align-l hisat2-build-s hisat2-build-l hisat2-inspect-s hisat2-inspect-l hisat3n-bin/
          tar -czvf hisat3n-linux-x86_64.tar.gz hisat3n-bin/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hisat3n-bin
          path: hisat3n-linux-x86_64.tar.gz

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: hisat3n-linux-x86_64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
